<!DOCTYPE html>
<html>

<head>
  <!-- VERSION-FLOOR NOTE (manual): params.Line2.threshold raycasting works on
       A-Frame >= 1.5.0 (three r158+). Swap the A-Frame src below for
       https://aframe.io/releases/1.5.0/aframe.min.js to prove the floor. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="../dist/connecting-line.js"></script>
  <script src="../../raycaster-thresholds/index.js"></script>
  <link rel="stylesheet" href="../../../styles.css">
  <style>
    .text-overlay { max-width: 46rem; }
  </style>
  <script>
    // Minimal orthographic camera (A-Frame's `camera` is always perspective).
    // Lifted from units-ortho.html. No zoom here — the screen-space pick band is
    // the point.
    AFRAME.registerComponent('ortho-camera', {
      schema: { height: { default: 6 }, near: { default: 0.1 }, far: { default: 100 } },
      init() {
        const sceneEl = this.el.sceneEl;
        const setup = () => {
          const h = this.data.height / 2;
          const aspect = () => window.innerWidth / window.innerHeight;
          const cam = new THREE.OrthographicCamera(
            -h * aspect(), h * aspect(), h, -h, this.data.near, this.data.far);
          cam.updateProjectionMatrix();
          this.el.setObject3D('camera', cam);
          sceneEl.camera = cam;
          if (this.el.components.camera) this.el.components.camera.camera = cam;
          this.onResize = () => {
            cam.left = -h * aspect(); cam.right = h * aspect();
            cam.top = h; cam.bottom = -h;
            cam.updateProjectionMatrix();
          };
          window.addEventListener('resize', this.onResize);
        };
        if (sceneEl.hasLoaded && sceneEl.canvas) setup();
        else sceneEl.addEventListener('loaded', setup);
      },
      remove() { if (this.onResize) window.removeEventListener('resize', this.onResize); }
    });

    // Hover tint + live status readout (same as raycast-perspective.html).
    AFRAME.registerComponent('hover-tint', {
      schema: {
        attr: { type: 'string' },
        base: { type: 'color', default: 'cyan' },
        tint: { type: 'color', default: 'yellow' },
        label: { type: 'string', default: '' }
      },
      init() {
        const el = this.el;
        el.addEventListener('mouseenter', () => {
          el.setAttribute(this.data.attr, 'color', this.data.tint);
          setStatus('HIT: ' + (this.data.label || this.data.attr));
        });
        el.addEventListener('mouseleave', () => {
          el.setAttribute(this.data.attr, 'color', this.data.base);
          setStatus('—');
        });
      }
    });

    function setStatus(text) {
      const el = document.getElementById('status');
      if (el) el.textContent = text;
    }

    // One-time diagnostic: confirm raycastUnits:auto resolves to px here.
    // Production resolves it from the active SCENE camera (sceneEl.camera) — A-Frame
    // never sets raycaster.camera — so we check the same source.
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        const isOrtho = !!(scene.camera && scene.camera.isOrthographicCamera);
        console.log('[raycast-orthographic] sceneEl.camera.isOrthographicCamera =',
          isOrtho, '-> raycastUnits:auto resolves to', isOrtho ? 'px' : 'm (MIS-RESOLVED!)');
      });
    });
  </script>
</head>

<body>
  <!-- DETAIL (kept off-screen). simple-draw's 2D case: an orthographic camera +
       screen-space (px) detection. The cursor carries
       raycaster-thresholds="line2Mode:set; line2:8", so params.Line2.threshold =
       8 PIXELS (px because these targets detect in screen space; matchLine's
       metres would be unpickable here — which is why px targets use line2Mode:set
       rather than the matchLine default). cyan = raycastUnits:px (stock
       screen-space); red = raycastUnits:auto, which resolves to px under this
       orthographic camera (see the console diagnostic). -->
  <div class="text-overlay">
    <p><b>connecting-line2 — px raycast (orthographic camera)</b></p>
    <p>Hover either line: it turns <b>yellow</b> when picked (watch Status). Both
       have an ~8px grab band, so they pick from a few pixels away from the 1px
       stroke.</p>
    <p>Status: <b id="status">—</b></p>
  </div>
  <a class="code-link" target="_blank"
    href="https://github.com/diarmidmackenzie/aframe-components/blob/main/components/connecting-line/test/raycast-orthographic.html">
    view code
  </a>

  <a-scene background="color:black">
    <a-entity id="orthoCam" camera ortho-camera position="0 0 5">
      <a-entity cursor="rayOrigin:mouse"
                raycaster="objects:.pickable; far:50"
                raycaster-thresholds="line2Mode:set; line2:8"></a-entity>
    </a-entity>

    <a-sphere id="al" position="-2  1 0" radius="0.03" color="#888"></a-sphere>
    <a-sphere id="ar" position=" 2  1 0" radius="0.03" color="#888"></a-sphere>
    <a-sphere id="bl" position="-2 -1 0" radius="0.03" color="#888"></a-sphere>
    <a-sphere id="br" position=" 2 -1 0" radius="0.03" color="#888"></a-sphere>

    <a-text color="white" value="raycastUnits:px"        position="-2.6  1.3 0" scale="0.4 0.4 0.4"></a-text>
    <a-text color="white" value="raycastUnits:auto (=px)" position="-2.6 -0.7 0" scale="0.4 0.4 0.4"></a-text>

    <a-entity class="pickable"
      connecting-line2__a="start:#al; end:#ar; color:cyan; width:1; units:px; raycastUnits:px"
      hover-tint="attr:connecting-line2__a; base:cyan; tint:yellow; label:px-line"></a-entity>
    <a-entity class="pickable"
      connecting-line2__b="start:#bl; end:#br; color:red; width:1; units:px; raycastUnits:auto"
      hover-tint="attr:connecting-line2__b; base:red; tint:yellow; label:auto-line"></a-entity>
  </a-scene>
</body>

</html>
