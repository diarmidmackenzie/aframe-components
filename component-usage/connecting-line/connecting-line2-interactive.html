<!DOCTYPE html>
<html>

<head>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
  <script src="../../components/dat-gui/dist/dat-gui.js"></script>
  <script src="../../components/connecting-line/dist/connecting-line.js"></script>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    /* dat-gui auto-positions top-right; move the overlay to the left so the two
       don't overlap. */
    .text-overlay { left: 10px; right: auto; }
  </style>
</head>

<body>
  <div class="text-overlay">
    <p>connecting-line2: live-editable via dat-gui.</p>
    <p>Use the dat-gui panel to edit width, units, dash, dashUnits, dashOffset,
       color, opacity and tubeRadius on the line between the two spheres.</p>
    <p>For the dash array, type space- or comma-separated numbers,
       e.g. "12 8" or "18 6 3 6".</p>
  </div>
  <a class="code-link" target="_blank"
    href="https://github.com/diarmidmackenzie/aframe-components/blob/main/component-usage/connecting-line/connecting-line2-interactive.html">
    view code
  </a>

  <a-scene background="color:#222">
    <a-entity camera
      look-controls="enabled:false"
      orbit-controls="target:0 1.6 -3; minDistance:0.5; maxDistance:50;
                      initialPosition:0 1.6 1; rotateSpeed:0.5">
    </a-entity>

    <a-sphere id="endA" position="-1.5 1.6 -3" radius="0.08" color="#EF2D5E"></a-sphere>
    <a-sphere id="endB" position=" 1.5 1.6 -3" radius="0.08" color="#EF2D5E"></a-sphere>

    <a-entity id="theLine"
      connecting-line2="start:#endA; end:#endB; color:#74BEC1; width:6;
                        units:px; dash:12 8; dashUnits:px; dashOffset:0;
                        opacity:1; tubeRadius:0"
      dat-gui>
  </a-scene>
</body>

</html>
